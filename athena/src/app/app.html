<mat-sidenav-container class="container">

  <!-- SIDEBAR -->
  <mat-sidenav
    #drawer
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) ? false : true"
    class="sidenav"
  >

    <div class="logo">
      <svg
        width="240"
        height="56"
        viewBox="0 0 240 56"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="Sistema de Gestão de Projetos Acadêmicos"
      >
        <!-- ÍCONE (lâmpada) -->
        <g transform="translate(6,6) scale(1.09)">
          <!-- Raios -->
          <g stroke="#FBBF24" stroke-width="2.2" stroke-linecap="round" opacity="0.95">
            <line x1="22" y1="4.5" x2="22" y2="8.0" />
            <line x1="11.2" y1="8.6" x2="13.7" y2="11.1" />
            <line x1="32.8" y1="8.6" x2="30.3" y2="11.1" />
            <line x1="7.0" y1="18.0" x2="10.5" y2="18.0" />
            <line x1="33.5" y1="18.0" x2="37.0" y2="18.0" />
          </g>

          <!-- Bulbo amarelo -->
          <path
            fill="#F59E0B"
            d="M22 10.2c-5.1 0-9.2 3.9-9.2 8.8 0 3.0 1.6 5.6 4.1 7.2
              1.1.7 1.7 1.8 1.7 3.1v.6h6.8v-.6c0-1.3.6-2.4 1.7-3.1
              2.5-1.6 4.1-4.2 4.1-7.2 0-4.9-4.1-8.8-9.2-8.8z"
          />

          <!-- Brilho -->
          <circle cx="18" cy="16" r="3" fill="rgba(255,255,255,0.3)" />

          <!-- Base branca -->
          <rect x="17.2" y="30.2" width="9.6" height="3.1" rx="1.2" fill="#FFFFFF" />
          <rect x="18.2" y="34.0" width="7.6" height="2.6" rx="1.1" fill="#FFFFFF" opacity="0.95" />
        </g>

        <!-- TEXTOS -->
        <g font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial" fill="#ffffff">
          <text x="55" y="24" font-size="18" font-weight="600">Projeto Integrador</text>
          <text x="55" y="42" font-size="14" font-weight="500" fill="rgba(255,255,255,0.9)">
            Athena Acadêmico
          </text>
        </g>
      </svg>
    </div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <mat-icon>home</mat-icon>
        <span>Dashboard</span>
      </a>

      <a routerLink="/integrador/projetos" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <mat-icon>folder</mat-icon>
        <span>Projetos</span>
      </a>

      <a routerLink="/alunos" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <mat-icon>group</mat-icon>
        <span>Alunos</span>
      </a>

      <a routerLink="/configuracoes" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <mat-icon>settings</mat-icon>
        <span>Configurações</span>
      </a>
    </nav>

  </mat-sidenav>


  <!-- CONTEÚDO -->
  <mat-sidenav-content>

    <!-- TOOLBAR BRANCA -->
    <mat-toolbar class="toolbar">

      <button mat-icon-button *ngIf="isHandset$ | async" (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="breadcrumb">
        Home / Projetos / Cadastro
      </div>

      <div class="spacer"></div>

      <div class="user-area">
        <mat-icon>notifications</mat-icon>
        <span class="user-name">Thiago</span>
        <mat-icon>account_circle</mat-icon>
      </div>

    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
